version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: notification_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - notification_net
    environment:
      - APP_ENV=${APP_ENV:-local}

  nginx:
    image: nginx:1.25-alpine
    container_name: notification_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - notification_net

  db:
    image: postgres:15-alpine
    container_name: notification_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-notifications}
      POSTGRES_USER: ${DB_USERNAME:-notifications}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-notifications}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - notification_net

  redis:
    image: redis:7-alpine
    container_name: notification_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - notification_net

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: notification_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --backoff=10 --timeout=90
    volumes:
      - .:/var/www
    depends_on:
      - db
      - redis
    networks:
      - notification_net

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: notification_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www
    depends_on:
      - db
      - redis
    networks:
      - notification_net

networks:
  notification_net:
    driver: bridge

volumes:
  db_data:
